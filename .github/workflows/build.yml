name: Build TeensyEprom

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        working-directory: firmware
        run: |
          pio run -e teensy41
          mkdir -p ${{ github.workspace }}/out
          cp .pio/build/teensy41/firmware.hex ${{ github.workspace }}/out/TeensyEprom.hex

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-hex
          path: out/TeensyEprom.hex
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    needs: build-firmware
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyserial pyinstaller

      - name: Build EXE
        run: >
          pyinstaller
          --onefile
          --console
          --name TeensyEprom
          app/teensy_eprom.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: TeensyEprom-Windows
          path: dist/TeensyEprom.exe
          retention-days: 90

  release:
    needs: [build-firmware, build-windows]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Download firmware
        uses: actions/download-artifact@v4
        with:
          name: firmware-hex
          path: dist/

      - name: Download EXE
        uses: actions/download-artifact@v4
        with:
          name: TeensyEprom-Windows
          path: dist/

      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Delete existing latest release
        run: |
          gh release delete latest --yes || true
          git push origin :refs/tags/latest || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "TeensyEprom — Latest Build"
          body: |
            ## TeensyEprom — EPROM emulator for Teensy 4.1

            **Commit:** `${{ steps.sha.outputs.short }}` — ${{ github.event.head_commit.message }}

            ### Downloads
            - **TeensyEprom.exe** — Desktop ROM manager (Windows)
            - **TeensyEprom.hex** — Firmware (flash via Teensy Loader)

            ### Quick Start
            1. Flash `TeensyEprom.hex` to Teensy 4.1 via [Teensy Loader](https://www.pjrc.com/teensy/loader.html)
            2. Run `TeensyEprom.exe` — auto-detects Teensy USB port
            3. `upload stock.bin` — upload your first ROM
            4. Plug DIP-28 socket into ECU, key on
            5. 3 slow LED blinks = EPROM emulation active

            ROM storage: internal flash (LittleFS) — no SD card needed.
          files: |
            dist/TeensyEprom.hex
            dist/TeensyEprom.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
