; PlatformIO project configuration — Teensy Lite (map switcher only)
; Build:  pio run -c platformio_lite.ini -e teensy_lite
; Output: .pio/build/teensy_lite/firmware.hex

[env:teensy_lite]
platform    = teensy
board       = teensy41
framework   = arduino

; Only compile src/lite — explicitly exclude everything else
src_filter  = -<*> +<lite/>

build_flags =
    -DTEENSY_LITE
    -O2

board_build.f_cpu = 600000000L
