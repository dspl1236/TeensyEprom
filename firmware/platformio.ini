; =============================================================================
; platformio.ini — TeensyEprom
;
; Build:   pio run
; Upload:  pio run --target upload
; Monitor: pio device monitor
; =============================================================================

[env:teensy41]
platform    = teensy
board       = teensy41
framework   = arduino

build_flags =
    -O2
    -DARDUINO_TEENSY41

board_build.f_cpu = 600000000L
monitor_speed     = 115200
