; =============================================================================
; platformio.ini — TeensyEprom v2.0
;
; Build:   pio run
; Upload:  pio run --target upload
; Monitor: pio device monitor
; =============================================================================

[env:teensy41]
platform    = teensy
board       = teensy41
framework   = arduino

build_flags =
    -O2
    -DARDUINO_TEENSY41

; LittleFS is included in the Teensy core — no extra lib needed.
; SD library is also built-in.

board_build.f_cpu = 600000000L
monitor_speed     = 115200
