<!-- Title -->
<text class="th" x="340" y="24" text-anchor="middle">TeensyEprom wiring schematic</text>
<text class="ts" x="340" y="42" text-anchor="middle">Teensy 4.1 EPROM emulator — 27C256 / 27C512 replacement</text>

